name: Validate redis-pvxs-ioc image

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    # Untrusted pull-request code must not run on Fermilab self-hosted runners.
    # Push/manual validation remains on the release-equivalent adlinux3 host.
    runs-on: ${{ github.event_name == 'pull_request' && 'ubuntu-24.04' || 'adlinux3' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Build validation image
        id: build
        run: |
          VERSION="$(tr -d '\n' < VERSION)"
          REVISION="$(git rev-parse --short=12 HEAD)"
          IMAGE="redis-pvxs-ioc:ci-${GITHUB_SHA}"

          docker build \
            --platform linux/amd64 \
            --build-arg REDIS_PVXS_IOC_VERSION="${VERSION}" \
            --build-arg REDIS_PVXS_IOC_REVISION="${REVISION}" \
            --build-arg REDIS_PVXS_IOC_SOURCE="https://github.com/fermi-ad/redis-pvxs-ioc" \
            -t "${IMAGE}" \
            .

          echo "image=${IMAGE}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "revision=${REVISION}" >> "${GITHUB_OUTPUT}"

      - name: Validate image metadata
        run: |
          IMAGE="${{ steps.build.outputs.image }}"
          VERSION="${{ steps.build.outputs.version }}"
          REVISION="${{ steps.build.outputs.revision }}"

          test "$(docker image inspect "${IMAGE}" --format '{{index .Config.Labels "org.opencontainers.image.version"}}')" = "${VERSION}"
          test "$(docker image inspect "${IMAGE}" --format '{{index .Config.Labels "org.opencontainers.image.revision"}}')" = "${REVISION}"
          test "$(docker image inspect "${IMAGE}" --format '{{index .Config.Labels "org.opencontainers.image.licenses"}}')" = "BSD-3-Clause"

      - name: Validate runtime image
        run: |
          IMAGE="${{ steps.build.outputs.image }}"
          VERSION="${{ steps.build.outputs.version }}"
          REVISION="${{ steps.build.outputs.revision }}"

          docker run --rm "${IMAGE}" --version | tee /tmp/redis-pvxs-ioc-version.txt
          grep -F "redis-pvxs-ioc ${VERSION} (${REVISION})" /tmp/redis-pvxs-ioc-version.txt
          docker run --rm "${IMAGE}" --check-config /etc/redis-pvxs-ioc/config.yaml
          docker run --rm --entrypoint /bin/sh "${IMAGE}" -c \
            'test -r /usr/share/doc/redis-pvxs-ioc/LICENSE && test -r /usr/share/doc/redis-pvxs-ioc/NOTICE && test -r /usr/share/doc/redis-pvxs-ioc/THIRD_PARTY_NOTICES.md'
