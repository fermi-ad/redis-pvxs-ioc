server:
  instance: demo
  namespace: DEMO
  auto_beacon: true
  # Default gRPC "BPM query server" endpoint for RPC PVs that omit rpc.endpoint.
  rpc_default_endpoint: bpm-query-server:50051

redis:
  base_key: demo
  host: redis
  port: 6379
  workers: 2
  readers: 2

alarms:
  stream: acorn:alarms

channelfinder:
  owner: redis-pvxs-ioc
  tags:
    - demo
  properties:
    deployment: redis-pvxs-ioc-demo

pvs:
  - name: source:temperature
    type: float64
    shape: scalar
    read:
      backend: redis
      key: temperature:rb
    metadata:
      description: Source temperature
      units: C
      precision: 1
      form: default
      display:
        low: 0
        high: 100
      control:
        low: 0
        high: 120
      min_step: 0.1
    alarm:
      low_warning: 5
      high_warning: 75
      high_alarm: 90
      hysteresis: 1
    initial: 21.5

  - name: magnet:current
    type: float64
    shape: scalar
    read:
      backend: redis
      key: magnet:current
    write:
      backend: redis
      key: magnet:current
    confirm:
      backend: redis
      key: magnet:current
      timeout_ms: 500
    metadata:
      description: Magnet current
      units: A
      precision: 2
      form: engineering
      display:
        low: 0
        high: 15
      control:
        low: 0
        high: 15
      min_step: 0.1
    alarm:
      low_warning: 0.5
      high_warning: 7
      high_alarm: 8
      hysteresis: 0.1
    transform:
      kind: linear
      scale: 0.1
      offset: 0.0
    initial: 0.0

  - name: waveform
    type: float32
    shape: array
    read:
      backend: redis
      key: waveform:rb
    metadata:
      description: Demo waveform
      units: V
      precision: 2
      form: decimal
      display:
        low: -10
        high: 10
      control:
        low: -10
        high: 10
    initial: [0.0, 1.5, 3.0, 1.5, 0.0]

  # ---- RPC-forwarding PVs (pvxcall -> BpmQuery gRPC server) ----------------
  # `pvxcall DEMO:BI:ORBIT event=255 delta_ns=1000000000` forwards to the
  # gRPC server's OnEvent RPC. Call-time args override the fixed defaults below.
  - name: BI:ORBIT
    rpc:
      method: OnEvent
      # endpoint omitted -> uses server.rpc_default_endpoint
      digitizer: MTCA1-1
      subkey: BPM_H1_POS
      event: 0xFF
      delta_ns: 1000000000

  - name: BI:AVG
    rpc:
      method: Average
      endpoint: bpm-query-server:50051
      digitizer: MTCA1-1
      subkey: BPM_H1_POS
      length_ns: 1000000000

  - name: BI:ORBIT:TABLE
    rpc:
      method: Orbit
      machine: BOOSTER
      length_ns: 1000000000
