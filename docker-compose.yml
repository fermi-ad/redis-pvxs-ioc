services:
  redis:
    image: adregistry.fnal.gov/instrumentation/redis@sha256:365ee40e627b9faf0775c31c7d6eb9e88a2de201e981b28bd5206029375977b6
    container_name: redis-pvxs-ioc-redis
    networks:
      - redis-pvxs-ioc
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 15

  ioc:
    build:
      context: .
    container_name: redis-pvxs-ioc-demo
    networks:
      - redis-pvxs-ioc
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "5075:5075"
      - "5076:5076/udp"
    volumes:
      - ./demo/config.yaml:/etc/redis-pvxs-ioc/config.yaml:ro

networks:
  redis-pvxs-ioc:
    driver: bridge
